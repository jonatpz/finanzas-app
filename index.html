<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10; --bg2:#111318; --bg3:#191d26; --bg4:#1f2433;
  --border:#252b3b; --border2:#2e3650;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#4a5568;
  --accent:#3b82f6; --accent2:#60a5fa;
  --green:#10b981; --green2:#34d399;
  --red:#ef4444; --red2:#f87171;
  --yellow:#f59e0b; --purple:#8b5cf6;
  --r:10px; --r2:6px;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  --nav-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:500;cursor:pointer;position:relative;transition:color .15s;letter-spacing:.02em;}
.nav-btn svg{width:20px;height:20px;stroke-width:1.6;}
.nav-btn.active{color:var(--accent2);}
.nav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:0 0 2px 2px;}

/* PAGES */
.page{display:none;padding-bottom:calc(var(--nav-h)+16px);min-height:100vh;animation:fi .2s ease;}
.page.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* PAGE HEADER */
.ph{padding:48px 16px 16px;display:flex;justify-content:space-between;align-items:flex-end;}
.ph-eyebrow{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:3px;}
.ph-title{font-size:22px;font-weight:700;letter-spacing:-.02em;}
.mnav{display:flex;align-items:center;gap:6px;}
.mnav button{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.mnav span{font-size:12px;font-weight:600;color:var(--text);min-width:96px;text-align:center;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 8px;}
.kpi-row.three{grid-template-columns:1fr 1fr 1fr;}
.kpi-row.one{grid-template-columns:1fr;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r) var(--r) 0 0;}
.kpi.k-blue::before{background:var(--accent);}
.kpi.k-green::before{background:var(--green);}
.kpi.k-red::before{background:var(--red);}
.kpi.k-purple::before{background:var(--purple);}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:7px;}
.kpi-value{font-size:20px;font-weight:700;font-family:var(--mono);letter-spacing:-.03em;line-height:1;}
.kpi-value.green{color:var(--green2);} .kpi-value.red{color:var(--red2);} .kpi-value.blue{color:var(--accent2);}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:5px;}

/* SECTION */
.sec{padding:12px 16px 0;}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);}

/* TABLE */
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.tbl-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.tbl-row:last-child{border-bottom:none;}
.tbl-icon{width:34px;height:34px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tbl-info{flex:1;min-width:0;}
.tbl-main{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbl-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.tbl-right{text-align:right;flex-shrink:0;}
.tbl-amount{font-family:var(--mono);font-size:13px;font-weight:600;}
.tbl-amount.pos{color:var(--green2);} .tbl-amount.neg{color:var(--red2);}
.tbl-badge{margin-top:3px;}

/* BADGE */
.badge{display:inline-flex;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.04em;}
.badge-green{background:rgba(16,185,129,.12);color:var(--green2);}
.badge-red{background:rgba(239,68,68,.12);color:var(--red2);}

/* CAT BARS */
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.cat-row:last-child{border-bottom:none;}
.cat-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-name{font-size:12px;font-weight:500;}
.cat-track{height:3px;background:var(--bg4);border-radius:2px;margin-top:5px;}
.cat-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s;}
.cat-amt{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0;}

/* CHART */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.chart-bars{display:flex;align-items:flex-end;gap:3px;height:80px;margin:10px 0 4px;}
.ch-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end;}
.ch-bars{display:flex;gap:2px;align-items:flex-end;width:100%;}
.ch-i{background:var(--green);border-radius:2px 2px 0 0;min-height:2px;flex:1;opacity:.8;}
.ch-g{background:var(--red);border-radius:2px 2px 0 0;min-height:2px;flex:1;opacity:.8;}
.ch-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;}
.chart-legend{display:flex;gap:12px;margin-top:8px;}
.ch-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;}
.ch-leg{font-size:10px;color:var(--text3);}

/* PROGRESS */
.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-name{font-size:13px;font-weight:600;}
.prog-pct{font-size:11px;font-family:var(--mono);color:var(--text3);}
.prog-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .5s;}
.prog-ok{background:var(--green);} .prog-warn{background:var(--yellow);} .prog-over{background:var(--red);}
.prog-foot{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text3);font-family:var(--mono);}

/* FORM */
.form-wrap{padding:0 16px 16px;}
.form-group{margin-bottom:13px;}
.form-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);display:block;margin-bottom:6px;}
.form-input,.form-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-family:var(--font);font-size:14px;padding:11px 12px;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .15s;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tipo-opt{padding:11px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;}
.tipo-opt.sel-gasto{border-color:var(--red);background:rgba(239,68,68,.08);color:var(--red2);}
.tipo-opt.sel-ingreso{border-color:var(--green);background:rgba(16,185,129,.08);color:var(--green2);}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:600;padding:14px;cursor:pointer;margin-top:6px;letter-spacing:.01em;transition:opacity .15s;}
.btn-primary:active{opacity:.85;} .btn-primary:disabled{opacity:.4;}
.btn-dashed{width:calc(100% - 32px);margin:8px 16px;background:transparent;border:1px dashed var(--border2);color:var(--text3);border-radius:var(--r);padding:13px;font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}

/* CHIPS */
.chips{display:flex;gap:6px;padding:4px 16px 8px;overflow-x:auto;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;letter-spacing:.02em;transition:all .15s;}
.chip.active{border-color:var(--accent);color:var(--accent2);background:rgba(59,130,246,.08);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:flex-end;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.sheet{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;padding:20px 16px 36px;border-top:1px solid var(--border);position:relative;}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:16px;letter-spacing:-.01em;}
.sheet-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 18px;font-size:12px;font-weight:500;opacity:0;transition:all .25s;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green2);} .toast.err{border-color:var(--red);color:var(--red2);}

/* MISC */
.loading{text-align:center;padding:48px 16px;color:var(--text3);font-size:12px;}
.spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 10px;}
@keyframes rot{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:12px;line-height:1.8;}
</style>
</head>
<body>

<!-- INICIO -->
<div id="page-inicio" class="page active">
  <div class="ph">
    <div><div class="ph-eyebrow">Panel principal</div><div class="ph-title">Mis Finanzas</div></div>
    <div class="mnav"><button onclick="changeMonth(-1)">‹</button><span id="ml-inicio"></span><button onclick="changeMonth(1)">›</button></div>
  </div>
  <div id="inicio-content"><div class="loading"><div class="spin"></div>Cargando...</div></div>
</div>

<!-- REGISTRAR -->
<div id="page-registrar" class="page">
  <div class="ph"><div><div class="ph-eyebrow">Nuevo</div><div class="ph-title">Registrar</div></div></div>
  <div class="form-wrap">
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <div class="tipo-grid">
        <button class="tipo-opt sel-gasto" id="btn-gasto" onclick="setTipo('gasto')">↓ Gasto</button>
        <button class="tipo-opt" id="btn-ingreso" onclick="setTipo('ingreso')">↑ Ingreso</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Monto (USD)</label><input class="form-input" id="f-monto" type="number" step="0.01" min="0" placeholder="0.00" inputmode="decimal"></div>
    <div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="f-categoria" onchange="loadSubcats()"></select></div>
    <div class="form-group"><label class="form-label">Subcategoría</label><select class="form-select" id="f-subcategoria"></select></div>
    <div class="form-group"><label class="form-label">Medio de pago</label><select class="form-select" id="f-medio"></select></div>
    <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" id="f-fecha" type="date"></div>
    <div class="form-group"><label class="form-label">Descripción</label><input class="form-input" id="f-desc" type="text" placeholder="Opcional"></div>
    <div class="form-group"><label class="form-label">Comentario</label><input class="form-input" id="f-comentario" type="text" placeholder="Opcional"></div>
    <button class="btn-primary" id="submit-btn" onclick="guardarMovimiento()">Guardar movimiento</button>
  </div>
</div>

<!-- MOVIMIENTOS -->
<div id="page-movimientos" class="page">
  <div class="ph">
    <div><div class="ph-eyebrow">Historial</div><div class="ph-title">Movimientos</div></div>
    <div class="mnav"><button onclick="changeMonth(-1)">‹</button><span id="ml-mov"></span><button onclick="changeMonth(1)">›</button></div>
  </div>
  <div class="chips">
    <button class="chip active" onclick="setFilter('todos',this)">Todos</button>
    <button class="chip" onclick="setFilter('gasto',this)">Gastos</button>
    <button class="chip" onclick="setFilter('ingreso',this)">Ingresos</button>
  </div>
  <div class="sec" style="padding-top:4px">
    <div class="tbl" id="mov-list"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  </div>
</div>

<!-- PRESUPUESTOS -->
<div id="page-presupuestos" class="page">
  <div class="ph">
    <div><div class="ph-eyebrow">Control</div><div class="ph-title">Presupuestos</div></div>
    <div class="mnav"><button onclick="changeMonth(-1)">‹</button><span id="ml-pres"></span><button onclick="changeMonth(1)">›</button></div>
  </div>
  <div id="pres-content" style="padding:0 16px"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  <button class="btn-dashed" onclick="openBudgetModal()">+ Nuevo presupuesto</button>
</div>

<!-- ANUAL -->
<div id="page-anual" class="page">
  <div class="ph">
    <div><div class="ph-eyebrow">Resumen</div><div class="ph-title">Balance Anual</div></div>
    <div class="mnav"><button onclick="changeYear(-1)">‹</button><span id="year-label"></span><button onclick="changeYear(1)">›</button></div>
  </div>
  <div id="anual-content"><div class="loading"><div class="spin"></div>Cargando...</div></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('inicio',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Inicio
  </button>
  <button class="nav-btn" onclick="showPage('registrar',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Registrar
  </button>
  <button class="nav-btn" onclick="showPage('movimientos',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Movimientos
  </button>
  <button class="nav-btn" onclick="showPage('presupuestos',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Presupuestos
  </button>
  <button class="nav-btn" onclick="showPage('anual',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3,9 21,9"/><polyline points="9,21 9,9"/></svg>Anual
  </button>
</nav>

<!-- MODAL -->
<div class="overlay" id="budget-modal" onclick="closeBudgetModal(event)">
  <div class="sheet">
    <button class="sheet-close" onclick="closeBudgetModal()">×</button>
    <div class="sheet-title">Nuevo presupuesto</div>
    <div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="b-categoria"></select></div>
    <div class="form-group"><label class="form-label">Límite mensual (USD)</label><input class="form-input" id="b-limite" type="number" step="0.01" min="0" placeholder="0.00" inputmode="decimal"></div>
    <button class="btn-primary" onclick="guardarPresupuesto()">Guardar presupuesto</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB='https://kdvahirorgdjcosrqelx.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkdmFoaXJvcmdkamNvc3JxZWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjk1OTYsImV4cCI6MjA5MjkwNTU5Nn0.CRppkVmSSWSefRHes6mK-FePcJl5NmL4ZQPXCwsC6GA';
const UID=1;
const H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
const MNS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MSS=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const ICO={'Trabajo':'💼','Alimentación':'🍽️','Hogar':'🏠','G.Personal':'🧴','Ocio':'🎮','Servicios':'⚡','Dinero extra':'💰','Otros':'📦'};

let cm=new Date().getMonth()+1, cy=new Date().getFullYear(), cy2=new Date().getFullYear();
let cf='todos', ct='gasto';
let cats=[], subs=[], meds=[];

const fmt=n=>'$'+parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const rng=()=>{const f=`${cy}-${String(cm).padStart(2,'0')}-01`,l=new Date(cy,cm,0).getDate();return{from:f,to:`${cy}-${String(cm).padStart(2,'0')}-${l}`};};

async function api(t,p=''){const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:H});if(!r.ok){console.error(r.status);return[];}return r.json();}
async function apiPost(t,b){return fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(b)});}
async function apiUpsert(t,b){return fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(b)});}

function setLabels(){
  const l=`${MNS[cm-1]} ${cy}`;
  ['ml-inicio','ml-mov','ml-pres'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=l;});
  const y=document.getElementById('year-label');if(y)y.textContent=cy2;
}
function changeMonth(d){cm+=d;if(cm>12){cm=1;cy++;}if(cm<1){cm=12;cy--;}setLabels();loadInicio();loadMovimientos();loadPresupuestos();}
function changeYear(d){cy2+=d;setLabels();loadAnual();}

function showPage(n,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');btn.classList.add('active');
  if(n==='inicio')loadInicio();
  if(n==='movimientos')loadMovimientos();
  if(n==='presupuestos')loadPresupuestos();
  if(n==='anual')loadAnual();
}

async function loadInicio(){
  const el=document.getElementById('inicio-content');
  el.innerHTML='<div class="loading"><div class="spin"></div>Cargando...</div>';
  const{from,to}=rng();
  const[movs,gMovs]=await Promise.all([
    api('movimientos',`fecha=gte.${from}&fecha=lte.${to}&usuario_id=eq.${UID}&select=monto,tipo,subcategoria_id,fecha,descripcion`),
    api('movimientos',`fecha=gte.${from}&fecha=lte.${to}&usuario_id=eq.${UID}&tipo=eq.gasto&select=monto,subcategoria_id`)
  ]);
  let ing=0,gas=0;
  movs.forEach(m=>m.tipo==='ingreso'?ing+= +m.monto:gas+= +m.monto);
  const saldo=ing-gas,pct=ing>0?Math.round(gas/ing*100):0;
  const catM={};
  gMovs.forEach(m=>{const s=subs.find(x=>x.id===m.subcategoria_id);if(s){const c=cats.find(x=>x.id===s.categoria_id);if(c)catM[c.nombre]=(catM[c.nombre]||0)+ +m.monto;}});
  const top=Object.entries(catM).sort((a,b)=>b[1]-a[1]).slice(0,5),maxC=top[0]?.[1]||1;
  const rec=movs.slice().sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,5);

  el.innerHTML=`
    <div class="kpi-row">
      <div class="kpi k-green"><div class="kpi-label">Ingresos</div><div class="kpi-value green">${fmt(ing)}</div><div class="kpi-sub">${movs.filter(m=>m.tipo==='ingreso').length} transacciones</div></div>
      <div class="kpi k-red"><div class="kpi-label">Gastos</div><div class="kpi-value red">${fmt(gas)}</div><div class="kpi-sub">${pct}% del ingreso</div></div>
    </div>
    <div class="kpi-row one">
      <div class="kpi ${saldo>=0?'k-blue':'k-purple'}">
        <div class="kpi-label">Saldo neto · ${MNS[cm-1]} ${cy}</div>
        <div class="kpi-value ${saldo>=0?'blue':'red'}">${fmt(saldo)}</div>
        <div class="kpi-sub">${saldo>=0?'▲ Balance positivo':'▼ Balance negativo'}</div>
      </div>
    </div>
    ${top.length?`<div class="sec"><div class="sec-head"><span class="sec-title">Gastos por categoría</span></div><div class="tbl">${top.map(([n,a])=>`<div class="cat-row"><div class="cat-icon">${ICO[n]||'📦'}</div><div class="cat-info"><div class="cat-name">${n}</div><div class="cat-track"><div class="cat-fill" style="width:${(a/maxC*100).toFixed(1)}%"></div></div></div><div class="cat-amt">${fmt(a)}</div></div>`).join('')}</div></div>`:''}
    ${rec.length?`<div class="sec" style="padding-bottom:16px"><div class="sec-head"><span class="sec-title">Últimos movimientos</span></div><div class="tbl">${rec.map(m=>{const s=subs.find(x=>x.id===m.subcategoria_id),c=s?cats.find(x=>x.id===s.categoria_id):null,d=new Date(m.fecha+'T12:00:00').toLocaleDateString('es-EC',{day:'numeric',month:'short'});return`<div class="tbl-row"><div class="tbl-icon">${ICO[c?.nombre]||'📦'}</div><div class="tbl-info"><div class="tbl-main">${m.descripcion||s?.nombre||'—'}</div><div class="tbl-sub">${c?.nombre||''} · ${d}</div></div><div class="tbl-right"><div class="tbl-amount ${m.tipo==='ingreso'?'pos':'neg'}">${m.tipo==='ingreso'?'+':'−'}${fmt(m.monto)}</div></div></div>`;}).join('')}</div></div>`:''}
  `;
}

function setFilter(f,btn){cf=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');loadMovimientos();}
async function loadMovimientos(){
  const el=document.getElementById('mov-list');
  el.innerHTML='<div class="loading"><div class="spin"></div>Cargando...</div>';
  const{from,to}=rng();
  let p=`fecha=gte.${from}&fecha=lte.${to}&usuario_id=eq.${UID}&order=fecha.desc,id.desc`;
  if(cf!=='todos')p+=`&tipo=eq.${cf}`;
  const movs=await api('movimientos',p);
  if(!movs.length){el.innerHTML='<div class="empty">Sin movimientos este mes</div>';return;}
  el.innerHTML=movs.map(m=>{
    const s=subs.find(x=>x.id===m.subcategoria_id),c=s?cats.find(x=>x.id===s.categoria_id):null,med=meds.find(x=>x.id===m.medio_pago_id);
    const d=new Date(m.fecha+'T12:00:00').toLocaleDateString('es-EC',{day:'numeric',month:'short'});
    return`<div class="tbl-row"><div class="tbl-icon">${ICO[c?.nombre]||'📦'}</div><div class="tbl-info"><div class="tbl-main">${m.descripcion||s?.nombre||'—'}</div><div class="tbl-sub">${d}${c?' · '+c.nombre:''}${med?' · '+med.nombre:''}</div></div><div class="tbl-right"><div class="tbl-amount ${m.tipo==='ingreso'?'pos':'neg'}">${m.tipo==='ingreso'?'+':'−'}${fmt(m.monto)}</div><div class="tbl-badge"><span class="badge ${m.tipo==='ingreso'?'badge-green':'badge-red'}">${m.tipo}</span></div></div></div>`;
  }).join('');
}

function setTipo(t){ct=t;document.getElementById('btn-gasto').className='tipo-opt'+(t==='gasto'?' sel-gasto':'');document.getElementById('btn-ingreso').className='tipo-opt'+(t==='ingreso'?' sel-ingreso':'');fillCats();}
function fillCats(){const sel=document.getElementById('f-categoria');sel.innerHTML=cats.filter(c=>c.tipo_id===(ct==='ingreso'?1:2)).map(c=>`<option value="${c.id}">${ICO[c.nombre]||'📦'} ${c.nombre}</option>`).join('');loadSubcats();}
function loadSubcats(){const id=+document.getElementById('f-categoria').value;document.getElementById('f-subcategoria').innerHTML=subs.filter(s=>s.categoria_id===id).map(s=>`<option value="${s.id}">${s.nombre}</option>`).join('');}

async function guardarMovimiento(){
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Guardando...';
  const monto=+document.getElementById('f-monto').value,scId=+document.getElementById('f-subcategoria').value,mId=+document.getElementById('f-medio').value,fecha=document.getElementById('f-fecha').value,desc=document.getElementById('f-desc').value,com=document.getElementById('f-comentario').value;
  if(!monto||!fecha||!scId){toast('Completa los campos requeridos','err');btn.disabled=false;btn.textContent='Guardar movimiento';return;}
  const r=await apiPost('movimientos',{monto,subcategoria_id:scId,medio_pago_id:mId,fecha,descripcion:desc,comentario:com,tipo:ct,usuario_id:UID});
  if(r.ok||r.status===201){toast('Movimiento guardado ✓','ok');document.getElementById('f-monto').value='';document.getElementById('f-desc').value='';document.getElementById('f-comentario').value='';}
  else toast('Error al guardar','err');
  btn.disabled=false;btn.textContent='Guardar movimiento';
}

async function loadPresupuestos(){
  const el=document.getElementById('pres-content');el.innerHTML='<div class="loading"><div class="spin"></div>Cargando...</div>';
  const{from,to}=rng();
  const[pres,movs]=await Promise.all([api('presupuestos',`usuario_id=eq.${UID}&mes=eq.${cm}&anio=eq.${cy}`),api('movimientos',`fecha=gte.${from}&fecha=lte.${to}&usuario_id=eq.${UID}&tipo=eq.gasto&select=monto,subcategoria_id`)]);
  const gpc={};movs.forEach(m=>{const s=subs.find(x=>x.id===m.subcategoria_id);if(s)gpc[s.categoria_id]=(gpc[s.categoria_id]||0)+ +m.monto;});
  if(!pres.length){el.innerHTML='<div class="empty">Sin presupuestos este mes.<br>Agrega uno abajo.</div>';return;}
  el.innerHTML=pres.map(p=>{const c=cats.find(x=>x.id===p.categoria_id),g=gpc[p.categoria_id]||0,pct=Math.min(g/p.monto_limite*100,100),cls=pct<70?'prog-ok':pct<90?'prog-warn':'prog-over';return`<div class="prog-card"><div class="prog-head"><div class="prog-name">${ICO[c?.nombre]||'📦'} ${c?.nombre||'—'}</div><div class="prog-pct">${pct.toFixed(0)}%</div></div><div class="prog-track"><div class="prog-fill ${cls}" style="width:${pct}%"></div></div><div class="prog-foot"><span>Gastado: ${fmt(g)}</span><span>Límite: ${fmt(p.monto_limite)}</span></div></div>`;}).join('');
}
function openBudgetModal(){document.getElementById('b-categoria').innerHTML=cats.filter(c=>c.tipo_id===2).map(c=>`<option value="${c.id}">${ICO[c.nombre]||'📦'} ${c.nombre}</option>`).join('');document.getElementById('budget-modal').classList.add('open');}
function closeBudgetModal(e){if(!e||e.target===document.getElementById('budget-modal'))document.getElementById('budget-modal').classList.remove('open');}
async function guardarPresupuesto(){
  const cId=+document.getElementById('b-categoria').value,lim=+document.getElementById('b-limite').value;
  if(!lim){toast('Ingresa un monto','err');return;}
  const r=await apiUpsert('presupuestos',{usuario_id:UID,categoria_id:cId,mes:cm,anio:cy,monto_limite:lim});
  if(r.ok||r.status===201){toast('Presupuesto guardado ✓','ok');closeBudgetModal();document.getElementById('b-limite').value='';loadPresupuestos();}
  else toast('Error al guardar','err');
}

async function loadAnual(){
  const el=document.getElementById('anual-content');el.innerHTML='<div class="loading"><div class="spin"></div>Cargando...</div>';
  const movs=await api('movimientos',`fecha=gte.${cy2}-01-01&fecha=lte.${cy2}-12-31&usuario_id=eq.${UID}&select=fecha,monto,tipo,subcategoria_id`);
  const byM=Array.from({length:12},()=>({i:0,g:0}));const catT={};let tI=0,tG=0;
  movs.forEach(m=>{const mes=new Date(m.fecha+'T12:00:00').getMonth(),a=+m.monto;if(m.tipo==='ingreso'){byM[mes].i+=a;tI+=a;}else{byM[mes].g+=a;tG+=a;const s=subs.find(x=>x.id===m.subcategoria_id);if(s)catT[s.categoria_id]=(catT[s.categoria_id]||0)+a;}});
  const saldo=tI-tG,maxV=Math.max(...byM.map(m=>Math.max(m.i,m.g)),1);
  const sc=Object.entries(catT).sort((a,b)=>b[1]-a[1]),maxC=sc[0]?.[1]||1;
  el.innerHTML=`
    <div class="kpi-row three">
      <div class="kpi k-green"><div class="kpi-label">Ingresos</div><div class="kpi-value green" style="font-size:16px">${fmt(tI)}</div></div>
      <div class="kpi k-red"><div class="kpi-label">Gastos</div><div class="kpi-value red" style="font-size:16px">${fmt(tG)}</div></div>
      <div class="kpi ${saldo>=0?'k-blue':'k-purple'}"><div class="kpi-label">Saldo</div><div class="kpi-value ${saldo>=0?'blue':'red'}" style="font-size:16px">${fmt(saldo)}</div></div>
    </div>
    <div class="sec"><div class="sec-head"><span class="sec-title">Evolución mensual</span></div>
    <div class="chart-card">
      <div class="chart-bars">${byM.map((m,i)=>{const hi=Math.round(m.i/maxV*76),hg=Math.round(m.g/maxV*76);return`<div class="ch-col"><div class="ch-bars"><div class="ch-i" style="height:${hi}px"></div><div class="ch-g" style="height:${hg}px"></div></div><div class="ch-lbl">${MSS[i]}</div></div>`;}).join('')}</div>
      <div class="chart-legend"><span><span class="ch-dot" style="background:var(--green)"></span><span class="ch-leg">Ingresos</span></span><span><span class="ch-dot" style="background:var(--red)"></span><span class="ch-leg">Gastos</span></span></div>
    </div></div>
    <div class="sec" style="padding-bottom:16px"><div class="sec-head"><span class="sec-title">Gastos por categoría</span></div>
    <div class="tbl">${sc.length?sc.map(([cid,amt])=>{const c=cats.find(x=>x.id==cid);return`<div class="cat-row"><div class="cat-icon">${ICO[c?.nombre]||'📦'}</div><div class="cat-info"><div class="cat-name">${c?.nombre||'—'}</div><div class="cat-track"><div class="cat-fill" style="width:${(amt/maxC*100).toFixed(1)}%"></div></div></div><div class="cat-amt" style="color:var(--red2)">${fmt(amt)}</div></div>`;}).join(''):'<div class="empty">Sin datos</div>'}</div></div>
  `;
}

function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2800);}

async function init(){
  setLabels();
  document.getElementById('f-fecha').value=new Date().toISOString().split('T')[0];
  [cats,subs,meds]=await Promise.all([api('categorias','order=nombre.asc'),api('subcategorias','order=nombre.asc'),api('mediospago','order=nombre.asc')]);
  document.getElementById('f-medio').innerHTML=meds.map(m=>`<option value="${m.id}">${m.nombre}</option>`).join('');
  fillCats();loadInicio();
}
init();
</script>
</body>
</html>
